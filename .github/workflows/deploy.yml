name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Security gate — BETA_OPEN_ALL must be false
        run: |
          python -m pytest tests/test_business_logic.py::TestBetaFlagSecurityGate::test_beta_open_all_is_false_in_ci_or_prod -v
        env:
          MONGGEUL_PROD: '1'
      - run: npm run build
      - name: Add config.js to dist
        run: |
          cat > dist/config.js << EOCONFIG
          window.SUPABASE_URL='${{ secrets.SUPABASE_URL }}';
          window.SUPABASE_ANON_KEY='${{ secrets.SUPABASE_ANON_KEY }}';
          window.GA_ID='${{ secrets.GA_ID }}';
          window.VAPID_PUBLIC_KEY='${{ secrets.VAPID_PUBLIC_KEY }}';
          window.ADSENSE_CLIENT='${{ secrets.ADSENSE_CLIENT }}';
          window.ADSENSE_SLOT='${{ secrets.ADSENSE_SLOT }}';
          EOCONFIG
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
