name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - name: Architecture Tests
        run: bash scripts/arch-test.sh "${{ github.workspace }}"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest
      - name: Beta Flag Security Gate
        run: CI=true python -m pytest tests/test_business_logic.py::TestBetaFlagSecurityGate::test_beta_open_all_is_false_in_ci_or_prod -v
      - run: npm run build
